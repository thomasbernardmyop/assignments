  <p>Here are the trending shows and movies right now.</p>

  <div class="wrap">
    <h2>Latest Blockbusters</h2>
    <img id="slide" src="images/1.png" alt="slideshow image">
    <div class="controls">
      <button onclick="prev()">Previous</button>
      <button onclick="next()">Next</button>
    </div>
  </div>

  <script>
  const images = [
    "images/1.png",
    "images/2.png",
    "images/3.png",
    "images/4.png",
    "images/5.png",
  ];

  const altTexts = [
    "Raven Movie",
    "coming soon october 2028 ",
    "Thomas the radio",
    "fellow our heart",
    "A Summer Film"
  ];

  let index = 0;
  const slide = document.getElementById("slide");

  function show() {
    slide.src = images[index];
    slide.alt = altTexts[index];
  }

  function next() {
    index++;
    if (index >= images.length) index = 0;
    show();
  }

  function prev() {
    index--;
    if (index < 0) index = images.length - 1;
    show();
  }

  show();

</script>
