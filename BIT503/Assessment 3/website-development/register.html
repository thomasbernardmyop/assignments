  <main class="container">
  <h2>Register</h2>
  <p>Please fill in the form below.</p>

<form action="#" method="post" class="form" autocomplete="on">
    <!-- First Name -->
    <div class="field">
      <label for="firstName">First name</label>
      <input
        type="text"
        id="firstName"
        name="firstName"
        autocomplete="given-name"
        pattern="[A-Za-z]+"
        required
      />
    </div>

    <!-- Last Name -->
    <div class="field">
      <label for="lastName">Last name</label>
      <input
        type="text"
        id="lastName"
        name="lastName"
        autocomplete="family-name"
        pattern="[A-Za-z]+"
        required
      />
    </div>

    <!-- Email -->
    <div class="field">
      <label for="email">Email</label>
      <input
        type="email"
        id="email"
        name="email"
        autocomplete="email"
        placeholder="e.g. user@gmail.com"
        title="Please enter a valid email address with @"
        required
      />
    </div>

    <!-- Mobile Number -->
    <div class="field">
      <label for="mobile">Mobile number</label>
      <input
       type="tel"
       id="mobile"
       name="mobile"
       inputmode="numeric"
       autocomplete="tel"
       pattern="[0-9]{9,10}"
       minlength="9"
      maxlength="10"
      placeholder="e.g. 0211234567"
      title="Please enter 9 to 10 digits, numbers only"
      required
/>
    </div>

    <!-- Password -->
    <div class="field">
      <label for="password">Password</label>
     <input
     type="password"
     id="password"
     name="password"
     autocomplete="new-password"
     pattern="(?=.*[A-Za-z])(?=.*\d)[A-Za-z\d]{6,12}"
     min="6"
     maxlength="12"
     title="Password must be 6–12 characters and include at least one letter and one number"
  required
/>
    </div>

    <!-- Confirm Password -->
    <div class="field">
      <label for="confirmPassword">Confirm password</label>
      <input
        type="password"
        id="confirmPassword"
        name="confirmPassword"
        autocomplete="new-password"
        minlength="6"
        maxlength="12"
        required
      />
    </div>

    <!-- Submit Button -->
    <button type="submit" class="btn">Register</button>
  </form>
</main>

<p id="message"></p>
